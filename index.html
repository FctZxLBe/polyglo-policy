<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyglo - Legal</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .logo { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    .sub { color: #6e6e73; font-size: 0.95rem; margin-bottom: 48px; }
    .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 40px;
      text-decoration: none;
      color: #1d1d1f;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
      min-width: 180px;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .card-icon { font-size: 2rem; margin-bottom: 12px; }
    .card-title { font-size: 1rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="logo">Polyglo</div>
  <div class="sub">Language Learning App</div>
  <div class="cards">
    <a href="terms.html" class="card">
      <div class="card-icon">📄</div>
      <div class="card-title">利用規約</div>
    </a>
    <a href="privacy.html" class="card">
      <div class="card-icon">🔒</div>
      <div class="card-title">プライバシーポリシー</div>
    </a>
  </div>
</body>
</html>
